# Security response headers, included in every server/location that emits content.
# `always` ensures they're sent on error responses too. CSP is intentionally
# permissive on inline script/style for now (the SPA uses inline styles); tighten
# to nonces in a later pass. HSTS is owned by the TLS edge (host nginx), not here.
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
