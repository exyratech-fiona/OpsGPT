# Shared location blocks, included by both the HTTP (:80) and HTTPS (:443)
# server blocks in opsgpt.conf. Keeps the SPA + reverse-proxy config in one place.

# static assets are content-hashed by Vite -> long cache
location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    # re-include: a location's own add_header resets inherited ones, so the
    # security headers must be repeated here to also cover static assets.
    include /etc/nginx/security-headers.conf;
}

location /api/ {
    # Re-resolve the backend via Docker's embedded DNS on every request so a
    # backend container recreation (new IP) never leaves nginx with a stale
    # upstream (which would 502). The variable proxy_pass forces this.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_backend backend;
    proxy_pass http://$upstream_backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- streaming (SSE) ---
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection "";
    proxy_read_timeout 3600s;
    chunked_transfer_encoding on;
}

# OpenAI-compatible public API (programmatic access with opsk_ API keys).
location /v1/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_api backend;
    proxy_pass http://$upstream_api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- streaming (SSE) ---
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection "";
    proxy_read_timeout 3600s;
    chunked_transfer_encoding on;
}

# Gateway token endpoint (POST /auth/token) for programmatic clients.
location /auth/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_auth backend;
    proxy_pass http://$upstream_auth:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

location / {
    try_files $uri $uri/ /index.html;
}
