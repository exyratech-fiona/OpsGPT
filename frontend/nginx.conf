# Serves the OpsGPT SPA and reverse-proxies the API to the FastAPI backend.
# SSE-safe: proxy buffering is disabled so tokens reach the browser immediately.
# TLS is terminated upstream by the host nginx (Let's Encrypt) which forwards
# here over plain HTTP, so this container only needs to listen on :80.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/security-headers.conf;
    include /etc/nginx/opsgpt-locations.conf;
}
