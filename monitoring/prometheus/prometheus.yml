global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: opsgpt-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: llama-inference
    metrics_path: /metrics
    static_configs:
      - targets: ["llamacpp:8080", "phi:8080", "xcoder:8080", "embed:8080"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
